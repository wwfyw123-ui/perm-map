<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ff4757" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Наша карта" />
  <title>Наше путешествие</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="apple-touch-startup-image" href="icon-512.png" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Выбор персонажа -->
  <div id="character-select" class="overlay">
    <h1>Кто ты? 💕</h1>
    <p class="subtitle">Выбери, чтобы видеть метки друг друга</p>
    <div class="character-buttons">
      <button id="btn-boy" class="char-btn boy">
        <span class="char-emoji">🧑</span>
        <span class="char-name">Я (Леша)</span>
      </button>
      <button id="btn-girl" class="char-btn girl">
        <span class="char-emoji">👩</span>
        <span class="char-name">Ты (Лера)</span>
      </button>
    </div>
  </div>

  <!-- Таймер -->
  <div id="countdown" class="overlay hidden">
    <h1>До встречи осталось:</h1>
    <h2 id="timer">...</h2>
    <p class="distance">скоро увидимся 💕</p>
    <div class="whoami">
      <span id="current-user-display">👤</span>
      <button id="switch-user">Сменить</button>
    </div>
    <button id="enter-btn">Войти на карту</button>
  </div>

  <!-- Модалка добавления места -->
  <div id="add-marker-modal" class="modal hidden">
    <div class="modal-content">
      <h3>📍 Добавить место</h3>
      <div class="author-badge" id="modal-author">🧑 Моя метка</div>

      <input type="text" id="place-title" placeholder="Название места..." required />
      <textarea id="place-desc" placeholder="Описание (зачем нам туда?)..."></textarea>

      <select id="place-category">
        <option value="🍔">🍔 Где поесть</option>
        <option value="🌳">🌳 Где погулять</option>
        <option value="💖">💖 Романтика / Наше место</option>
        <option value="🏠">🏠 Где будем жить</option>
        <option value="📸">📸 Красивое место для фото</option>
        <option value="🎁">🎁 Подарок / Сюрприз</option>
        <option value="🚗">🚗 Маршрут / Дорога</option>
      </select>

      <div class="photo-upload">
        <label for="place-photo">📷 Добавить фото:</label>
        <input type="file" id="place-photo" accept="image/*" />
        <div id="photo-preview" class="photo-preview hidden"></div>
      </div>

      <div class="modal-buttons">
        <button id="save-marker-btn">💾 Сохранить</button>
        <button id="close-modal-btn">❌ Отмена</button>
      </div>
    </div>
  </div>

  <!-- Модалка комментариев -->
  <div id="comments-modal" class="modal hidden">
    <div class="modal-content comments-content">
      <div class="comments-header">
        <h3 id="comments-place-title">💬 Комментарии</h3>
        <button id="close-comments-btn" class="close-x">✕</button>
      </div>
      <div id="comments-list" class="comments-list"></div>
      <div class="add-comment">
        <div class="comment-author-badge" id="comment-author">🧑</div>
        <textarea id="comment-text" placeholder="Напиши мнение..."></textarea>
        <button id="send-comment-btn">Отправить</button>
      </div>
    </div>
  </div>

  <!-- Модалка общей заметки -->
  <div id="note-modal" class="modal hidden">
    <div class="modal-content note-content">
      <div class="comments-header">
        <h3>📝 Общая заметка</h3>
        <button id="close-note-btn" class="close-x">✕</button>
      </div>
      <p class="note-hint">Пишите сюда планы, пожелания, список мест — видно обоим</p>
      <textarea id="note-text" placeholder="Начните писать..."></textarea>
      <div class="note-meta" id="note-meta"></div>
      <button id="save-note-btn">💾 Сохранить заметку</button>
    </div>
  </div>

  <!-- Карта -->
  <div id="map"></div>

  <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
  <div id="control-panel" class="control-panel">
    <div id="weather-widget" class="weather-widget"></div>
    <button id="theme-toggle" title="Тёмная тема">🌙</button>
    <button id="locate-btn" title="Где я?">📍</button>
    <button id="note-btn" title="Общая заметка">📝</button>
    <button id="panel-toggle-btn" title="Список мест">📋</button>
    <div id="live-indicator" class="live-dot" title="Кто-то онлайн">●</div>
  </div>

  <!-- Легенда -->
  <div id="legend" class="legend hidden">
    <div class="legend-item"><span class="dot boy-dot"></span> Леша <span class="legend-count" id="boy-count">0</span></div>
    <div class="legend-item"><span class="dot girl-dot"></span> Лера <span class="legend-count" id="girl-count">0</span></div>
  </div>

  <!-- Боковая панель -->
  <div id="side-panel" class="side-panel hidden">
    <div class="side-panel-header">
      <div class="panel-tabs">
        <button class="tab-btn active" id="tab-list" onclick="switchTab('list')">📋 Места</button>
        <button class="tab-btn" id="tab-timeline" onclick="switchTab('timeline')">🕐 Хронология</button>
      </div>
      <button id="close-panel-btn" class="close-x">✕</button>
    </div>

    <!-- Фильтр -->
    <div class="panel-filters" id="panel-filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="want">🎯 Хотим</button>
      <button class="filter-btn" data-filter="done">✅ Были</button>
    </div>

    <div id="panel-list" class="panel-content"></div>
    <div id="panel-timeline" class="panel-content hidden"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="main.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
