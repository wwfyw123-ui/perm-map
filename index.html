<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ff4757" />
  <title>Наше путешествие</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <!-- Твои стили -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Таймер до встречи -->
  <div id="countdown" class="overlay">
    <h1>До встречи осталось:</h1>
    <h2 id="timer">...</h2>
    <button id="enter-btn">Войти на карту</button>
  </div>

  <!-- Модальное окно для добавления нового места -->
  <div id="add-marker-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Добавить место</h3>
      <input type="text" id="place-title" placeholder="Название места..." required />
      <textarea id="place-desc" placeholder="Описание (зачем нам туда?)..."></textarea>
      <select id="place-category">
        <option value="🍔">🍔 Где поесть</option>
        <option value="🌳">🌳 Где погулять</option>
        <option value="💖">💖 Романтика / Наше место</option>
        <option value="🏠">🏠 Где будем жить</option>
      </select>
      <div class="modal-buttons">
        <button id="save-marker-btn">Сохранить</button>
        <button id="close-modal-btn">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Карта -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Firebase + твой код -->
  <script type="module" src="main.js"></script>
  
  <!-- Регистрация Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
